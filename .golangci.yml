version: "2"

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

run:
  timeout: 5m
  modules-download-mode: readonly

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
