name: Test Stability (CI Safeguards)

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

jobs:
  clean-resources:
    name: Clean test resources before running tests
    runs-on: ubuntu-latest
    steps:
      - name: Clean up Docker containers and networks
        run: |
          # Remove any leftover Docker containers that might conflict
          docker ps -a | grep -E "iceberg|testcontainers|duckdb" | awk '{print $1}' | xargs -r docker rm -f || true
          
          # Clean up networks and volumes
          docker network prune -f || true
          docker volume prune -f || true
          
          echo "✅ Docker cleanup complete"

  test-short-mode:
    name: Run tests in short mode (skips performance and integration tests)
    runs-on: ubuntu-latest
    needs: clean-resources
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Run tests with -short flag
        run: |
          # -short flag causes tests like TestTPCHQuery3JoinAggregation to skip
          # This prevents timeouts on performance tests in CI
          go test -short -timeout 30s ./...
        env:
          GOFLAGS: "-count=1"

  test-main-suite:
    name: Run main test suite (no -short)
    runs-on: ubuntu-latest
    needs: clean-resources
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Run main test suite (30s timeout for safety)
        run: |
          # Run tests with 30s timeout to catch any runaway tests
          # This prevents GitHub Actions from hanging
          go test -timeout 30s ./...
        env:
          GOFLAGS: "-count=1"
