name: Write Compatibility Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

jobs:
  duckdb-write-compat:
    name: DuckDB CLI Write Compatibility
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install DuckDB CLI v1.4.3
        run: |
          wget -q https://github.com/duckdb/duckdb/releases/download/v1.4.3/duckdb_cli-linux-amd64.zip
          unzip -q duckdb_cli-linux-amd64.zip
          sudo mv duckdb /usr/local/bin/duckdb
          sudo chmod +x /usr/local/bin/duckdb
          duckdb --version

      - name: Download Go dependencies
        run: go mod download

      - name: Run write compatibility tests
        run: |
          # Run the main CLI interop test that verifies:
          # - dukdb-go creates files
          # - DuckDB CLI can open them
          # - SHOW TABLES works
          # - DESCRIBE works
          # - SELECT queries work
          go test -v ./internal/storage/duckdb -run TestDuckDBCLIInterop

          # Run comprehensive interop tests that verify:
          # - Files created by dukdb-go can be read by DuckDB CLI
          # - Round-trip data integrity (dukdb-go → CLI → dukdb-go)
          # - All supported data types
          # - Large file handling
          # - Edge cases
          # - Compression compatibility
          go test -v ./internal/storage/duckdb -run TestDuckDBCLIReadsDukdbFile
          go test -v ./internal/storage/duckdb -run TestRoundTripDataIntegrity
          go test -v ./internal/storage/duckdb -run TestAllTypesRoundTrip
          go test -v ./internal/storage/duckdb -run TestLargeFileHandling
          go test -v ./internal/storage/duckdb -run TestInteropEdgeCases
          go test -v ./internal/storage/duckdb -run TestCompressionInterop

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: write-compat-test-artifacts
          path: |
            /tmp/dukdb-*.duckdb
            /tmp/dukdb-go-*.log
          retention-days: 7
